<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lottery Booking</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #0d1527; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 10px; }
        
        .main-container { 
            width: 100%; 
            max-width: 400px; 
            background-color: #ffffff; 
            padding: 20px; 
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .winner-card { background-color: #fff0f6; border: 1px solid #ffb8d2; border-radius: 10px; padding: 10px; display: flex; align-items: center; margin-bottom: 15px; }
        .win-photo { width: 45px; height: 45px; border-radius: 50%; margin-right: 10px; border: 2px solid #e6006f; object-fit: cover; }
        .winner-details { flex: 1; }
        .winner-name { color: #d11270; font-weight: 800; font-size: 13px; }
        .state-name { color: #1e293b; font-weight: 700; font-size: 11px; }
        .paid-badge { background-color: #e6006f; color: white; padding: 4px 8px; border-radius: 8px; font-size: 9px; font-weight: 800; text-align: center; }

        .input-group { margin-bottom: 10px; }
        .input-group label { display: block; color: #1e293b; font-weight: 700; font-size: 12px; margin-bottom: 4px; }
        .field-container { position: relative; }
        .field-container i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 14px; }
        input { width: 100%; padding: 10px 10px 10px 35px; border: 1.5px solid #e2e8f0; border-radius: 8px; background-color: #f8fafc; font-size: 14px; }

        .numbers-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; max-height: 300px; overflow-y: auto; padding: 5px; border: 1px solid #f1f5f9; border-radius: 8px; }
        .ticket-card-item { border: 1px solid #e2e8f0; background: #fff; padding: 8px; border-radius: 6px; text-align: center; cursor: pointer; }
        .ticket-card-item.selected { background-color: #000 !important; border-color: #000 !important; }
        .ticket-number-text { font-weight: 800; color: #1e293b; font-size: 12px; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .ticket-card-item.selected .ticket-number-text { color: #fff; }
        .ticket-price-tag { font-size: 9px; color: #64748b; margin-top: 2px; display: block; }
        
        .submit-btn { width: 100%; background-color: #e6006f; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 800; font-size: 14px; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="winner-card">
            <img src="https://i.pravatar.cc/100?u=1" class="win-photo">
            <div class="winner-details">
                <div class="winner-name">SWAPAN DAS</div>
                <div class="state-name">West Bengal</div>
            </div>
            <div class="paid-badge">₹447<br>PAID</div>
        </div>

        <div class="input-group">
            <label>👉 ENTER YOUR NAME 👉</label>
            <div class="field-container">
                <i class="fa-solid fa-user" style="color: #3b82f6;"></i>
                <input type="text" id="userName" placeholder="Your name">
            </div>
        </div>

        <div class="input-group">
            <label>📲 ENTER WHATSAPP NUMBER 📲</label>
            <div class="field-container">
                <i class="fa-solid fa-phone" style="color: #1e293b;"></i>
                <input type="tel" id="userPhone" placeholder="Mobile number">
            </div>
        </div>

        <label style="font-weight: 700; font-size: 12px; margin-bottom: 8px; display: block;">🥳 Choose Your Lucky Ticket 🥳</label>
        <div class="numbers-grid" id="ticketContainer"></div>

        <button class="submit-btn" type="button" onclick="sendToWhatsApp()">PROCEED TO BOOK &nbsp;<i class="fa-solid fa-arrow-right"></i></button>
    </div>

    <script>
        const container = document.getElementById('ticketContainer');
        for(let i=1; i<=500; i++) { 
            let code = "KL" + Math.floor(100000 + Math.random()*900000);
            let div = document.createElement('div');
            div.className = 'ticket-card-item';
            // टिकट का फोटो (icon) वापस जोड़ दिया है
            div.innerHTML = `<span class="ticket-number-text"><i class="fa-solid fa-ticket" style="color:#eab308;"></i> ${code}</span><span class="ticket-price-tag">₹149</span>`;
            div.onclick = function() { this.classList.toggle('selected'); };
            container.appendChild(div);
        }

        function sendToWhatsApp() {
            const name = document.getElementById('userName').value.trim();
            const phone = document.getElementById('userPhone').value.trim();
            const selected = document.querySelectorAll('.ticket-card-item.selected');
            
            if(!name || !phone) { alert("Please enter name and phone!"); return; }
            if(selected.length === 0) { alert("Please select tickets!"); return; }

            const tickets = Array.from(selected).map(el => el.querySelector('.ticket-number-text').innerText.replace('🎟️ ', '').trim());
            const message = `*Kerala lottery tickets booking*%0A%0A👤 *Name:* ${name}%0A📞 *WhatsApp:* ${phone}%0A%0A🎟️ *Selected Tickets (${tickets.length}):*%0A${tickets.join(', ')}%0A%0A💰 *Amount:* ₹${tickets.length * 149}`;
            
            window.location.href = `https://wa.me/918092559490?text=${encodeURIComponent(message)}`;
        }
    </script>
</body>
</html>
